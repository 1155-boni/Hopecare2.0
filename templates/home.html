<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Hopecare</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .user-info {
            background-color: #f0f0f0;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .nav-links {
            margin-top: 20px;
        }
        .nav-links a {
            margin: 0 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .nav-links a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Hopecare</h1>
        <div class="user-info">
            <p>Hello, <strong>{{ user.username }}</strong>!</p>
            <p>You are now logged in.</p>
        </div>
        <div class="nav-links">
            <a href="{% url 'sign_out' %}">Sign Out</a>
            <a href="{% url 'password_change' %}">Change Password</a>
        </div>
    </div>
</body>
</html>
